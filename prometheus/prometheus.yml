scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: kafka
    static_configs:
      - targets: [ "kafka-exporter:9308" ]
  - job_name: nginx
    static_configs:
      - targets: [ "nginx-exporter:9113" ]

global:
  scrape_interval: 10s
services:
  prometheus:
    build: ./prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: [ "CMD-SHELL", "echo > /dev/tcp/localhost/9092" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  postgres:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: myPassWord
      POSTGRES_DB: videogameexchange
    volumes:
      - postgres_data:/var/lib/postgresql

  api1:
    build: .
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "email_notifications"
      DATABASE_URL: "postgres://postgres:myPassWord@postgres:5432/videogameexchange"
    depends_on:
      - kafka

  api2:
    build: .
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "email_notifications"
      DATABASE_URL: "postgres://postgres:myPassWord@postgres:5432/videogameexchange"
    depends_on:
      - kafka
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
      - "8081:8080"
    depends_on:
      - api1
      - api2

  kafka-exporter:
    image: danielqsj/kafka-exporter
    command: [ "--kafka.server=kafka:9092" ]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_URI: "postgres:5432/videogameexchange?sslmode=disable"
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: myPassWord

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command: [ "--nginx.scrape-uri=http://nginx:8080/stub_status" ]

  notifier:
    build: ../VideoGameConsumer/
    environment:
      KAFKA_BROKER: "kafka:9092"
      NOTIF_TOPIC: "email_notifications"
    depends_on:
      kafka:
        condition: service_healthy


volumes:
  postgres_data:
  kafka_data:
  grafana_data:
